<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-label="cborn DocFlow overview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 54px Arial, Helvetica, sans-serif; fill: #f8fafc; }
      .sub { font: 400 22px Arial, Helvetica, sans-serif; fill: #cbd5e1; }
      .stepT { font: 700 26px Arial, Helvetica, sans-serif; fill: #f8fafc; }
      .stepB { font: 400 18px Arial, Helvetica, sans-serif; fill: #cbd5e1; }
      .pill { font: 700 15px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .small { font: 400 16px Arial, Helvetica, sans-serif; fill: #cbd5e1; }
    </style>
  </defs>

  <rect width="1200" height="640" rx="32" fill="url(#bg)"/>

  <rect x="60" y="54" width="1080" height="76" rx="18" fill="#0b1220" opacity="0.8"/>
  <rect x="60" y="54" width="1080" height="8" rx="4" fill="url(#accent)"/>
  <text x="96" y="103" class="title" font-size="32">cborn DocFlow</text>
  <rect x="1010" y="74" width="96" height="34" rx="17" fill="url(#accent)"/>
  <text x="1058" y="97" text-anchor="middle" class="pill">offline</text>

  <text x="96" y="182" class="title">Document OCR, tagging, and inbox import</text>
  <text x="96" y="224" class="sub">Local-first workflow for PDFs and images with rule-based labels.</text>

  <g filter="url(#shadow)">
    <rect x="78" y="284" width="320" height="210" rx="24" fill="#111827" stroke="#1f2937" stroke-width="2"/>
    <rect x="440" y="284" width="320" height="210" rx="24" fill="#111827" stroke="#1f2937" stroke-width="2"/>
    <rect x="802" y="284" width="320" height="210" rx="24" fill="#111827" stroke="#1f2937" stroke-width="2"/>
  </g>

  <circle cx="140" cy="340" r="28" fill="#22c55e"/>
  <text x="140" y="349" text-anchor="middle" class="stepT" font-size="24">1</text>
  <text x="190" y="336" class="stepT">Pick a file</text>
  <text x="190" y="370" class="stepB">PDF or image, then run OCR.</text>
  <text x="190" y="402" class="stepB">Choose first page or full PDF.</text>

  <circle cx="502" cy="340" r="28" fill="#38bdf8"/>
  <text x="502" y="349" text-anchor="middle" class="stepT" font-size="24">2</text>
  <text x="552" y="336" class="stepT">Match rules</text>
  <text x="552" y="370" class="stepB">Regex tags for invoice, contract,</text>
  <text x="552" y="402" class="stepB">and custom document types.</text>

  <circle cx="864" cy="340" r="28" fill="#a78bfa"/>
  <text x="864" y="349" text-anchor="middle" class="stepT" font-size="24">3</text>
  <text x="914" y="336" class="stepT">Save and route</text>
  <text x="914" y="370" class="stepB">Export text, watch folders, or</text>
  <text x="914" y="402" class="stepB">pull attachments from Gmail/Outlook.</text>

  <rect x="96" y="540" width="1008" height="44" rx="22" fill="#0b1220" opacity="0.9"/>
  <text x="120" y="569" class="small">Tesseract OCR " PySide6 UI " Rule-based tagging " Optional mail import " Windows friendly</text>
</svg>
