name: Bug report
description: Report a problem with cborn DocFlow
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug briefly.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: 1. ... 2. ... 3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Python / Windows version
      placeholder: Python 3.11, Windows 10/11
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any useful log output or attach screenshots.
