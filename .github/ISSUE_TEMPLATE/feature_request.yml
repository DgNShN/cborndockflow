name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Idea
      description: What would you like to add or improve?
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Why it matters
      description: Explain the user value or workflow improvement.
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Suggested approach
      description: Optional implementation notes, examples, or screenshots.
